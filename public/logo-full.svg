<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">My Fab Estimator logo</title>
  <desc id="desc">A stainless steel fabrication table with a blue approval check icon beside the words My Fab Estimator and the tagline Quote faster. Protect your margin.</desc>

  <defs>
    <linearGradient id="steelTop" x1="120" y1="130" x2="430" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F8FA"/>
      <stop offset="0.18" stop-color="#B8C2CC"/>
      <stop offset="0.42" stop-color="#FFFFFF"/>
      <stop offset="0.68" stop-color="#8D99A6"/>
      <stop offset="1" stop-color="#E5E7EB"/>
    </linearGradient>

    <linearGradient id="steelDark" x1="110" y1="260" x2="390" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6B7280"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#64748B"/>
    </linearGradient>

    <linearGradient id="legSteel" x1="0" y1="0" x2="38" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="0.35" stop-color="#E5E7EB"/>
      <stop offset="0.65" stop-color="#64748B"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="blueBadge" x1="230" y1="42" x2="350" y2="162" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0057C8"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.22"/>
    </filter>

    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.24"/>
    </filter>

    <style>
      .brand-main {
        font-family: Inter, Geist, Arial, Helvetica, sans-serif;
        font-weight: 800;
        letter-spacing: -0.045em;
        fill: #0F172A;
      }

      .brand-sub {
        font-family: Inter, Geist, Arial, Helvetica, sans-serif;
        font-weight: 500;
        letter-spacing: -0.03em;
        fill: #0EA5E9;
      }

      .tagline {
        font-family: Inter, Geist, Arial, Helvetica, sans-serif;
        font-weight: 600;
        letter-spacing: 0.24em;
        fill: #334155;
      }
    </style>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="145" y="226" width="32" height="150" rx="5" fill="url(#legSteel)" stroke="#0F172A" stroke-width="3"/>
    <rect x="390" y="226" width="32" height="150" rx="5" fill="url(#legSteel)" stroke="#0F172A" stroke-width="3"/>

    <path d="M154 296L386 230L422 252L190 322L154 296Z" fill="url(#steelDark)" stroke="#0F172A" stroke-width="4" stroke-linejoin="round"/>
    <path d="M190 322L422 252V274L190 346V322Z" fill="#1F2937" stroke="#0F172A" stroke-width="4" stroke-linejoin="round"/>
    <path d="M154 296L190 322V346L154 320V296Z" fill="#475569" stroke="#0F172A" stroke-width="4" stroke-linejoin="round"/>

    <rect x="178" y="276" width="34" height="156" rx="5" fill="url(#legSteel)" stroke="#0F172A" stroke-width="3"/>
    <rect x="425" y="203" width="34" height="156" rx="5" fill="url(#legSteel)" stroke="#0F172A" stroke-width="3"/>

    <path d="M90 172L390 86L496 146L193 241L90 172Z" fill="url(#steelTop)" stroke="#64748B" stroke-width="4" stroke-linejoin="round"/>
    <path d="M193 241L496 146V176L193 275V241Z" fill="#94A3B8" stroke="#64748B" stroke-width="4" stroke-linejoin="round"/>
    <path d="M90 172L193 241V275L90 205V172Z" fill="#CBD5E1" stroke="#64748B" stroke-width="4" stroke-linejoin="round"/>

    <path d="M137 171L384 101" stroke="white" stroke-width="5" stroke-opacity="0.6"/>
    <path d="M205 218L457 139" stroke="#64748B" stroke-width="3" stroke-opacity="0.35"/>
  </g>

  <g filter="url(#smallShadow)">
    <rect x="248" y="36" width="142" height="122" rx="16" fill="url(#blueBadge)"/>
    <path d="M279 96L310 128L366 61" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M390 49L390 36L402 30" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="560" y="210" class="brand-main" font-size="126">My Fab</text>
  <text x="562" y="326" class="brand-sub" font-size="104">Estimator</text>

  <line x1="560" y1="376" x2="1038" y2="376" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
  <line x1="560" y1="376" x2="770" y2="376" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round"/>
  <text x="560" y="438" class="tagline" font-size="28">QUOTE FASTER. PROTECT YOUR MARGIN.</text>
</svg>
